<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page">
    <header class="top">
      <h1 id="location">Loading...</h1>
    </header>

    <section class="section">
      <h2>Current</h2>

      <div class="current-row">
        <div class="current-temp">
          <strong id="temp">--</strong>
          <span id="apparent">--</span>
        </div>

        <div>
          <span class="label">Wind</span>
          <span id="wind">--</span>
        </div>

        <div>
          <span class="label">Precipitation</span>
          <span id="precipitation">--</span>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Hourly</h2>

      <div class="hourly-head">
        <span>Time</span>
        <span>Temp</span>
        <span>Rain</span>
        <span>Wind</span>
      </div>

      <div id="hourly"></div>
    </section>

    <section class="section">
      <h2>Weekly</h2>

      <div class="daily-head">
        <span>Day</span>
        <span>Min / Max</span>
        <span>Rain</span>
        <span>Wind</span>
      </div>

      <div id="daily"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
